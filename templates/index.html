<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic 8 Ball</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔮 Magic 8 Ball 🔮</h1>
        
        <div class="question-section">
            <input type="text" id="question" placeholder="Ask your question..." maxlength="200">
            <div class="button-group">
                <button id="askButton">Shake the Ball</button>
                <button id="resetButton" class="reset-btn">Reset</button>
            </div>
        </div>

        <div class="ball-container">
            <div class="magic-ball" id="magicBall">
                <!-- The outer black sphere -->
                <div class="ball-surface">
                    <!-- The number 8 face (front) -->
                    <div class="eight-face" id="eightFace">
                        <div class="eight-circle">
                            <span class="eight-number">8</span>
                        </div>
                    </div>
                    
                    <!-- The answer window (back, initially hidden) -->
                    <div class="answer-window" id="answerWindow">
                        <div class="answer-triangle">
                            <span class="answer-text" id="answerText"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="instructions">
            <p>Ask a yes/no question and shake the Magic 8 Ball for your answer!</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
